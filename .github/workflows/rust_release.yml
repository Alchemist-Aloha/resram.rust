name: Build and Release Rust Extension

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: libresram_rust.so
            asset_name: resram_rust-linux-amd64.so
          - os: macos-latest
            artifact_name: libresram_rust.dylib
            asset_name: resram_rust-macos-arm64.so
          - os: windows-latest
            artifact_name: resram_rust.dll
            asset_name: resram_rust-windows-amd64.pyd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust extension
        run: cargo build --release
        working-directory: ./resram_rust

      - name: Rename compiled library (Unix)
        if: matrix.os != 'windows-latest'
        run: mv resram_rust/target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Rename compiled library (Windows)
        if: matrix.os == 'windows-latest'
        run: Move-Item resram_rust\target\release\${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: ${{ matrix.asset_name }}
